<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>T2 - video + overlays</title>
    <style>
      #hero {
        position: relative;
        height: 981px;
        overflow: hidden;
      }
      #hero video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .hero-shade {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.4);
      }
      .hero-fade {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 544px;
        background: linear-gradient(
          to bottom,
          rgba(16, 39, 36, 0) 0%,
          #102724 100%
        );
      }
    </style>
  </head>
  <body style="margin: 0">
    <section id="hero">
      <video
        src="FairwayOffice - HD 720p.mp4"
        autoplay
        muted
        playsinline
        loop
        preload="auto"
      ></video>
      <div class="hero-shade"></div>
      <div class="hero-fade"></div>
    </section>
  </body>
</html>
